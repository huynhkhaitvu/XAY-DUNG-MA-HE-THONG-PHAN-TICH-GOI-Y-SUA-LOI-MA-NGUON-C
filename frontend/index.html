<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Code Analyzer - Phân tích & Gợi ý sửa lỗi C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🔧 C Code Analyzer</span>
            <span class="navbar-text text-muted">Phân tích & Gợi ý sửa lỗi mã C</span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Left: Code Editor -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">📝 Mã C</h5>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="codeEditor" class="form-control border-0" style="height: 500px; font-family: monospace; resize: none;" placeholder="Nhập mã C tại đây...">int main() {
    int sum = 0;
    for (int i = 1; i < 5; i++) {
        sum += i;
    }
    printf("Sum: %d\\n", sum);
    return 0;
}</textarea>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-success btn-sm" id="compileBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="compileSpinner" role="status" aria-hidden="true"></span>
                            ✓ Biên dịch
                        </button>
                        <button class="btn btn-info btn-sm" id="runBtn" data-bs-toggle="modal" data-bs-target="#runModal">
                            ▶ Chạy
                        </button>
                        <button class="btn btn-primary btn-sm" id="analyzeBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="analyzeSpinner" role="status" aria-hidden="true"></span>
                            🔍 Phân tích
                        </button>
                        <button class="btn btn-secondary btn-sm" id="clearBtn">
                            🗑 Clear
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">📊 Kết quả</h5>
                    </div>
                    <div class="card-body" id="resultsContainer" style="height: 550px; overflow-y: auto;">
                        <p class="text-muted">Kết quả sẽ hiển thị tại đây...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Test Cases Section -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h5 class="mb-0">🧪 Test Cases</h5>
                    </div>
                    <div class="card-body">
                        <div id="testCasesContainer"></div>
                        <button class="btn btn-outline-primary btn-sm" id="addTestCaseBtn">+ Thêm Test Case</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Run Modal -->
    <div class="modal fade" id="runModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chạy chương trình</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Nhập Input:</label>
                    <textarea id="programInput" class="form-control" style="height: 150px;" placeholder="Nhập input cho chương trình..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="executeBtn">Chạy</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">C Code Analyzer © 2026 - Hỗ trợ Phân tích & Gợi ý sửa lỗi</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
