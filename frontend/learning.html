<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Code Analyzer - Interactive Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .learning-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }
        
        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: 600;
        }
        
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        #codeEditor {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            height: 100%;
            resize: none;
        }
        
        .hint-box {
            background: #e7f3ff;
            border-left: 4px solid #0d6efd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        .hint-level {
            display: inline-block;
            background: #0d6efd;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .hint-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }
        
        .hint-question {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-top: 10px;
            border-radius: 4px;
            font-style: italic;
            font-size: 14px;
        }
        
        .progress-tracker {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        
        .test-result {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .test-result.passed {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .test-result.failed {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .hint-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .hint-buttons button {
            flex: 1;
        }
        
        .current-attempt {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🎓 Interactive C Learning</span>
            <span class="text-muted">Học sửa lỗi bằng hints hướng dẫn</span>
        </div>
    </nav>

    <div class="learning-container">
        <!-- Left Panel: Code Editor -->
        <div class="panel">
            <div class="panel-header">
                📝 Code Editor
                <span id="attemptInfo" class="float-end" style="font-size: 12px;"></span>
            </div>
            <div class="panel-content">
                <textarea id="codeEditor" placeholder="Mã C của bạn..."></textarea>
            </div>
            <div style="padding: 15px; background: white; border-top: 1px solid #eee;">
                <div class="button-group">
                    <button class="btn btn-success btn-sm" id="testBtn">✓ Chạy Test</button>
                    <button class="btn btn-info btn-sm" id="resetBtn">↻ Reset Code</button>
                    <button class="btn btn-warning btn-sm" id="submitBtn">✓ Submit</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Hints & Guidance -->
        <div class="panel" style="background: #f8f9fa;">
            <div class="panel-header">
                💡 Hints & Guidance
            </div>
            <div class="panel-content">
                <div id="hintContainer"></div>
                
                <!-- Hint Controls -->
                <div class="hint-buttons">
                    <button class="btn btn-outline-primary btn-sm" id="hintLevel1Btn">
                        Level 1
                        <br><small>Vague</small>
                    </button>
                    <button class="btn btn-outline-primary btn-sm" id="hintLevel2Btn">
                        Level 2
                        <br><small>Medium</small>
                    </button>
                    <button class="btn btn-outline-primary btn-sm" id="hintLevel3Btn">
                        Level 3
                        <br><small>Specific</small>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="guidanceBtn">
                        📋 Guidance
                    </button>
                </div>

                <!-- Test Results -->
                <div id="testResultsContainer"></div>

                <!-- Progress -->
                <div class="progress-tracker">
                    <strong>Progress</strong>
                    <div id="progressInfo"></div>
                    <div class="progress mt-2">
                        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Attempt History -->
                <div id="historyContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal: Start Learning -->
    <div class="modal fade" id="startModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Bắt Đầu Học</h5>
                </div>
                <div class="modal-body">
                    <form id="startForm">
                        <div class="mb-3">
                            <label>Mã C:</label>
                            <textarea id="problemCode" class="form-control" style="height: 200px;"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Yêu Cầu:</label>
                            <textarea id="problemRequirements" class="form-control" style="height: 100px;"></textarea>
                        </div>
                        <div id="testcasesContainer"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="startBtn">Bắt Đầu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="learning.js"></script>
</body>
</html>
