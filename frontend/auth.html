<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - Hệ thống phân tích mã C</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .auth-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .form-group input.error {
            border-color: #dc3545;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            color: #28a745;
            font-size: 13px;
            margin-top: 5px;
            display: none;
            background: #d4edda;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
        }
        
        .success-message.show {
            display: block;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .form-footer a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
        }

        .divider:before,
        .divider:after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider:before {
            margin-right: 10px;
        }

        .divider:after {
            margin-left: 10px;
        }

        .btn-google {
            background: white;
            border: 1px solid #ddd;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .btn-google:hover {
            background: #f9f9f9;
            border-color: #ccc;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div class="auth-container">
        <div class="auth-box">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2 class="auth-title">Đăng Nhập</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Tên đăng nhập</label>
                        <input type="text" id="loginUsername" required placeholder="Nhập tên đăng nhập">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Mật khẩu</label>
                        <input type="password" id="loginPassword" required placeholder="Nhập mật khẩu">
                    </div>
                    <div id="loginError" class="error-message"></div>
                    <div id="loginSuccess" class="success-message"></div>
                    <div id="loginLoading" class="loading">
                        <div class="spinner"></div>
                        <p>Đang xử lý...</p>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Đăng Nhập</button>
                </form>
                <div class="divider">Hoặc</div>
                <div id="googleLoginButton"></div>
                <div class="form-footer">
                    Chưa có tài khoản? <a onclick="toggleForm('signup')">Đăng ký ngay</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <h2 class="auth-title">Đăng Ký</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupUsername">Tên đăng nhập</label>
                        <input type="text" id="signupUsername" required placeholder="Ít nhất 3 ký tự" minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required placeholder="Nhập email">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Mật khẩu</label>
                        <input type="password" id="signupPassword" required placeholder="Ít nhất 6 ký tự" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="signupPasswordConfirm">Xác nhận mật khẩu</label>
                        <input type="password" id="signupPasswordConfirm" required placeholder="Nhập lại mật khẩu">
                    </div>
                    <div id="signupError" class="error-message"></div>
                    <div id="signupSuccess" class="success-message"></div>
                    <div id="signupLoading" class="loading">
                        <div class="spinner"></div>
                        <p>Đang xử lý...</p>
                    </div>
                    <button type="submit" class="btn btn-primary" id="signupBtn">Đăng Ký</button>
                </form>
                <div class="divider">Hoặc</div>
                <div id="googleSignupButton"></div>
                <div class="form-footer">
                    Đã có tài khoản? <a onclick="toggleForm('login')">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use relative API base so frontend and backend share origin (cookies work)
        const API_BASE = '/api';

        function toggleForm(form) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('signupForm').classList.remove('active');
            
            if (form === 'login') {
                document.getElementById('loginForm').classList.add('active');
                clearMessages('login');
            } else {
                document.getElementById('signupForm').classList.add('active');
                clearMessages('signup');
            }
        }

        function clearMessages(form) {
            const errorEl = document.getElementById(`${form}Error`);
            const successEl = document.getElementById(`${form}Success`);
            errorEl.classList.remove('show');
            successEl.classList.remove('show');
        }

        function showError(form, message) {
            const errorEl = document.getElementById(`${form}Error`);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById(`${form}Success`).classList.remove('show');
        }

        function showSuccess(form, message) {
            const successEl = document.getElementById(`${form}Success`);
            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById(`${form}Error`).classList.remove('show');
        }

        function showLoading(form, show = true) {
            const loadingEl = document.getElementById(`${form}Loading`);
            const btnEl = document.getElementById(`${form}Btn`);
            
            if (show) {
                loadingEl.classList.add('show');
                btnEl.disabled = true;
            } else {
                loadingEl.classList.remove('show');
                btnEl.disabled = false;
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showError('login', 'Vui lòng nhập tên đăng nhập và mật khẩu');
                return;
            }
            
            showLoading('login', true);
            clearMessages('login');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('login', 'Đăng nhập thành công! Đang chuyển hướng...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('login', data.error || 'Đăng nhập thất bại');
                }
            } catch (error) {
                showError('login', 'Lỗi kết nối: ' + error.message);
            } finally {
                showLoading('login', false);
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            
            // Validation
            if (!username || !email || !password || !passwordConfirm) {
                showError('signup', 'Vui lòng nhập đầy đủ thông tin');
                return;
            }
            
            if (username.length < 3) {
                showError('signup', 'Tên đăng nhập phải từ 3 ký tự trở lên');
                return;
            }
            
            if (password.length < 6) {
                showError('signup', 'Mật khẩu phải từ 6 ký tự trở lên');
                return;
            }
            
            if (password !== passwordConfirm) {
                showError('signup', 'Mật khẩu không khớp');
                return;
            }
            
            showLoading('signup', true);
            clearMessages('signup');
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        password_confirm: passwordConfirm
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('signup', 'Đăng ký thành công! Vui lòng đăng nhập.');
                    // Reset form
                    event.target.reset();
                    setTimeout(() => {
                        toggleForm('login');
                    }, 2000);
                } else {
                    showError('signup', data.error || 'Đăng ký thất bại');
                }
            } catch (error) {
                showError('signup', 'Lỗi kết nối: ' + error.message);
            } finally {
                showLoading('signup', false);
            }
        }

        // Check if already logged in
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/auth/check`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.authenticated) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.log('Auth check error:', error);
            }
        }

        // Google Sign-In Handler
        const GOOGLE_CLIENT_ID = '324954443132-g7q1iqolbmhf3ofbot0ipfuera3u3qh6.apps.googleusercontent.com';

        function handleCredentialResponse(response) {
            // The response contains the JWT in response.credential
            const token = response.credential;
            
            // Decode JWT to get user info (basic parsing - for production use proper JWT library)
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const userInfo = JSON.parse(jsonPayload);
            
            // Check if on signup or login form
            const form = document.getElementById('loginForm').classList.contains('active') ? 'login' : 'signup';
            
            if (form === 'login') {
                loginWithGoogle(userInfo);
            } else {
                signupWithGoogle(userInfo);
            }
        }

        async function loginWithGoogle(userInfo) {
            try {
                showLoading('login', true);
                
                // Use email as username for Google login
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: userInfo.email,
                        password: userInfo.sub // Use Google ID as password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('login', 'Đăng nhập bằng Google thành công!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('login', data.error || 'Đăng nhập bằng Google thất bại');
                }
            } catch (error) {
                showError('login', 'Lỗi kết nối: ' + error.message);
            } finally {
                showLoading('login', false);
            }
        }

        async function signupWithGoogle(userInfo) {
            try {
                showLoading('signup', true);
                
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: userInfo.email.split('@')[0], // Use email prefix as username
                        email: userInfo.email,
                        password: userInfo.sub, // Use Google ID as password
                        password_confirm: userInfo.sub
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('signup', 'Đăng ký bằng Google thành công! Đang đăng nhập...');
                    // Auto login after signup
                    setTimeout(() => {
                        loginWithGoogle(userInfo);
                    }, 1500);
                } else {
                    showError('signup', data.error || 'Đăng ký bằng Google thất bại');
                }
            } catch (error) {
                showError('signup', 'Lỗi kết nối: ' + error.message);
            } finally {
                showLoading('signup', false);
            }
        }

        // Initialize Google Sign-In
        function initGoogleSignIn() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });

            // Render buttons
            google.accounts.id.renderButton(
                document.getElementById('googleLoginButton'),
                {
                    theme: 'outline',
                    size: 'large',
                    width: '100%'
                }
            );

            google.accounts.id.renderButton(
                document.getElementById('googleSignupButton'),
                {
                    theme: 'outline',
                    size: 'large',
                    width: '100%'
                }
            );
        }

        // Check auth on page load
        checkAuth();

        // Initialize Google Sign-In when script loads
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for Google script to load
            if (window.google && window.google.accounts) {
                initGoogleSignIn();
            } else {
                // Try again after a short delay
                setTimeout(initGoogleSignIn, 1000);
            }
        });
    </script>
</body>
</html>
